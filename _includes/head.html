<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

{% assign page_title = page.title | default: site.title %}
<title>{% if page.title %}{{ page_title }} {{ site.title_separator }} {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description | strip_html | strip_newlines | escape }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">

<meta property="og:locale" content="{{ site.locale | default: 'en-US' }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{{ page_title | strip_html | strip_newlines | escape }}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_html | strip_newlines | escape }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">

<link rel="apple-touch-icon" sizes="180x180" href="{{ '/images/apple-touch-icon-180x180.png' | relative_url }}">
<link rel="icon" type="image/svg+xml" href="{{ '/images/favicon.svg' | relative_url }}">
<link rel="icon" type="image/png" href="{{ '/images/favicon-32x32.png' | relative_url }}" sizes="32x32">
<link rel="icon" type="image/png" href="{{ '/images/favicon-192x192.png' | relative_url }}" sizes="192x192">
<link rel="icon" href="{{ '/images/favicon.ico' | relative_url }}">
<meta name="theme-color" content="#f7fbff">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}">
