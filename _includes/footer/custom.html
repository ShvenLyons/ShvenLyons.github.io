>

</button>

<div style="margin: 0.75rem auto 0; max-width: 520px; text-align: center;">

    src="https://www.clustrmaps.com/map_v2.png?d=lR0YNxcjqpEfjOc8oSyXzAhRvDLwTa5hgsxWfNCQtLM&cl=ffffff"

<script>
  function openLogMap() {
    if (window.prompt("Password") === "adai") {
      window.open("https://clustrmaps.com/site/1c9ay", "_blank", "noopener,noreferrer");
    }
  }
</script>
