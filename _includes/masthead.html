<header class="site-header">
  <nav class="shell nav-bar" aria-label="Primary">
    <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <div class="nav-links">
      {% for link in site.data.navigation.main %}
        {% assign current_url = page.url | default: "/" %}
        <a href="{{ link.url | relative_url }}"{% if current_url == link.url %} aria-current="page"{% endif %}>{{ link.title }}</a>
      {% endfor %}
    </div>
  </nav>
</header>
